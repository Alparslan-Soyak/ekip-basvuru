<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>DEÜ Etkinlikleri | Aramıza Katıl</title>
    <meta name="description" content="Ekibimize katılmak için hemen başvur.">
    <meta property="og:title" content="DEÜ Etkinlikleri | Aramıza Katıl">
    <meta property="og:description" content="Ekibimize katılmak için hemen başvur.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="logo-1.png"> 

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0A192F, #112240, #233554); 
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }

        /* YAN YANA GÖRÜNÜM İÇİN GÜNCELLENEN BÖLÜM */
        .site-header {
            display: flex;
            flex-direction: row; /* Alt alta dizilimi iptal edip yan yana hizalar */
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }
        
        .logo {
            max-width: 80px; /* Yan yana dengeli durması için küçültüldü */
            height: auto;
            margin-right: 15px; /* İsim ile logo arasına sağdan boşluk eklendi */
            margin-bottom: 0; /* Eski alt boşluk silindi */
        }
        
        .header-title {
            font-size: 32px;
            font-weight: bold;
            margin: 0;
            letter-spacing: 2px;
            color: #ffffff;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.12);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            text-align: center;
            max-width: 350px;
            width: 90%;
        }
        
        .container-title { margin-top: 0; font-size: 24px; letter-spacing: 1px; }
        .description { margin-bottom: 30px; font-size: 14px; color: #8892B0; }
        
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            background-color: white;
            color: #0A192F;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-sizing: border-box;
            font-size: 15px;
        }
        
        .btn:hover, .btn:focus {
            transform: translateY(-3px);
            background-color: #64FFDA;
            box-shadow: 0 5px 15px rgba(100, 255, 218, 0.3);
            outline: none;
        }
    </style>
</head>
<body>

    <div class="site-header">
        <img src="logo-1.png" alt="DEÜ Etkinlikleri Logosu" class="logo">
        <h1 class="header-title">DEÜ Etkinlikleri</h1>
    </div>

    <main class="container">
        <h1 class="container-title">DEÜ Etkinlikleri Ekip Başvuru Formları</h1>
        <p class="description">Aramıza katılmak ve birlikte harika işler başarmak için başvurmak istediğin alanı seç.</p>
        
        <a href="https://forms.gle/KWMCDexEu3XE4Csf7" class="btn" aria-label="Organizasyon ekibine başvuru formu">🎯 Organizasyon ve Saha Ekibi</a>
        <a href="LINK_BURAYA_2" class="btn" aria-label="Sosyal medya ekibine başvuru formu">📱 Sosyal Medya Ekibi</a>
        <a href="LINK_BURAYA_3" class="btn" aria-label="Fotoğraf ekibine başvuru formu">📸 Fotoğraf ve Video Ekibi</a>
    </main>
</body>
</html>
